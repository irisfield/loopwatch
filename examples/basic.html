<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>loopwatch — basic example</title>
    <style>
      body {
        font-family: monospace;
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 1rem;
        background: #0f0f0f;
        color: #e0e0e0;
      }
      h1 {
        font-size: 1.2rem;
        color: #9cdcfe;
        margin-bottom: 0.25rem;
      }
      h2 {
        font-size: 0.9rem;
        color: #569cd6;
        margin: 1.5rem 0 0.25rem;
      }
      pre {
        background: #1e1e1e;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 0.75rem 1rem;
        overflow-x: auto;
        white-space: pre-wrap;
        color: #ce9178;
        min-height: 1.5rem;
      }
    </style>
  </head>
  <body>
    <h1>loopwatch</h1>

    <h2>measureLoopLag</h2>
    <pre id="out-lag">running…</pre>

    <h2>LongTaskObserver</h2>
    <pre id="out-longtask">running…</pre>

    <h2>microtaskScheduling</h2>
    <pre id="out-microtask">running…</pre>

    <h2>rafCadence</h2>
    <pre id="out-raf">running…</pre>

    <script type="module">
      import {
        LongTaskObserver,
        measureLoopLag,
        microtaskScheduling,
        rafCadence,
      } from "../dist/index.mjs";

      function display(id, value) {
        document.getElementById(id).textContent = JSON.stringify(value, null, 2);
      }

      // measureLoopLag — 1s sample
      measureLoopLag({ durationMs: 1000 }).then((report) => {
        display("out-lag", report);
      });

      // LongTaskObserver — collect for 3s then stop
      const observer = new LongTaskObserver({
        threshold: 50,
        onLongTask: (entry) => {
          console.log("long task detected:", entry.duration.toFixed(1), "ms");
        },
      });
      observer.start();
      setTimeout(() => {
        observer.stop();
        display("out-longtask", {
          collected: observer.getLongTasks().length,
          entries: [...observer].map((e) => ({
            startTime: e.startTime.toFixed(1),
            duration: e.duration.toFixed(1),
          })),
        });
      }, 3000);

      // microtaskScheduling
      microtaskScheduling({ count: 100 }).then((report) => {
        display("out-microtask", report);
      });

      // rafCadence — 1s sample
      rafCadence(1000).then((report) => {
        display("out-raf", report);
      });
    </script>
  </body>
</html>
