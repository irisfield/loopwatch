name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["22", "26"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run --filter 'loopwatch' lint
      - run: bun run --filter 'loopwatch' type-check
      - run: bun run --filter 'loopwatch' test
      - run: bun run --filter 'loopwatch' build
      - run: bun run --filter 'loopwatch' test:pack
      - run: bunx playwright install --with-deps chromium
      - run: bun run --filter 'loopwatch' test:browser
      - run: bun run --filter 'loopwatch-playwright' lint
      - run: bun run --filter 'loopwatch-playwright' type-check
      - run: bun run --filter 'loopwatch-playwright' build
      - run: bun run --filter 'loopwatch-playwright' test
