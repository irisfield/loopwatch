name: Update bundle size badge

on:
  push:
    tags:
      - "loopwatch@*"
      - "loopwatch-playwright@*"

jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Build loopwatch
        if: startsWith(github.ref_name, 'loopwatch@')
        run: bun run build
        working-directory: packages/core

      - name: Build loopwatch-playwright
        if: startsWith(github.ref_name, 'loopwatch-playwright@')
        run: bun run build
        working-directory: packages/playwright

      - name: Update bundle size badge in README
        run: |
          node << 'EOF'
          const fs = require("fs");
          const zlib = require("zlib");

          const tag = process.env.GITHUB_REF_NAME;
          let distFile, readmePath, packageName;

          if (tag.startsWith("loopwatch-playwright@")) {
            distFile = "packages/playwright/dist/index.min.mjs";
            readmePath = "packages/playwright/README.md";
            packageName = "loopwatch-playwright";
          } else if (tag.startsWith("loopwatch@")) {
            distFile = "packages/core/dist/index.min.mjs";
            readmePath = "packages/core/README.md";
            packageName = "loopwatch";
          } else {
            console.error(`Unknown tag format: ${tag} — expected loopwatch@* or loopwatch-playwright@*`);
            process.exit(1);
          }

          const content = fs.readFileSync(distFile);
          const minKb = (content.length / 1024).toFixed(1);
          const gzKb = (zlib.gzipSync(content).length / 1024).toFixed(1);
          const badge = `![Bundle size](https://img.shields.io/badge/bundle-${minKb}KB%20min%20%7C%20${gzKb}KB%20gzip-green.svg)`;
          const readme = fs.readFileSync(readmePath, "utf8");
          const pattern = /!\[Bundle size\]\(https:\/\/img\.shields\.io\/badge\/bundle-[^)]+\)/;
          if (!pattern.test(readme)) {
            console.error(`Bundle size badge not found in ${readmePath} — cannot update`);
            process.exit(1);
          }
          const updated = readme.replace(pattern, badge);
          if (updated !== readme) {
            fs.writeFileSync(readmePath, updated);
            fs.writeFileSync(".badge-meta", JSON.stringify({ package: packageName, size: `${minKb}KB min | ${gzKb}KB gzip`, readme: readmePath }));
            console.log("updated: " + badge);
          } else {
            console.log("badge unchanged");
          }
          EOF

      - name: Commit if changed
        run: |
          read_meta() { node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('.badge-meta','utf8'))['$1'])"; }
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f .badge-meta ]; then
            PACKAGE=$(read_meta package)
            SIZE=$(read_meta size)
            README=$(read_meta readme)
            git fetch origin main
            git reset origin/main
            git add "$README"
            git commit -m "updated ${PACKAGE} bundle size badge to ${SIZE}"
            git push origin HEAD:main
          fi
