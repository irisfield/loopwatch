<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>loopwatch browser smoke</title>
  </head>
  <body>
    <main>loopwatch browser smoke</main>
    <script type="module">
      import { LongTaskObserver, measureLoopLag } from "/dist/index.mjs";

      const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      function blockMainThread(ms) {
        const start = performance.now();
        while (performance.now() - start < ms) {
          Math.sqrt(Math.random());
        }
      }

      window.loopwatchSmoke = {
        async raf() {
          const m = await measureLoopLag(() => sleep(120));
          return {
            frameCount: m.raf.frameCount,
            estimatedFps: m.raf.estimatedFps,
            meanFrameTimeMs: m.raf.meanFrameTimeMs,
          };
        },
        async timeoutLag() {
          const startedAt = performance.now();
          await sleep(25);
          return performance.now() - startedAt;
        },
        async blockedLag() {
          const m = await measureLoopLag(async () => {
            await sleep(20);
            blockMainThread(90);
            await sleep(70);
          });
          return {
            sampleCount: m.lag.sampleCount,
            max: m.lag.max,
            p95: m.lag.p95,
          };
        },
        async longTask() {
          const observer = new LongTaskObserver({ threshold: 50 });
          observer.start();
          await sleep(25);
          blockMainThread(90);
          await sleep(150);
          observer.stop();
          return observer.getLongTasks().map((entry) => ({
            duration: entry.duration,
            entryType: entry.entryType,
            name: entry.name,
          }));
        },
      };
    </script>
  </body>
</html>
